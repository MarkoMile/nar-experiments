RUN_NAME: "cyclic-lr-NO_GC-0.075WD"
ALGORITHM: "bfs"
MODEL:
  DECODER_USE_LAST_HIDDEN: True
  PROCESSOR_USE_LAST_HIDDEN: True
  HIDDEN_DIM: 256
  PROCESSOR:
    NAME: "PGN"
    RESIDUAL: False
    KWARGS: [{ "aggr": "max" }]
    LAYERNORM:
      ENABLE: True
      MODE: "node"
  LATENT_NOISE_STD: 0.015
  TEACHER_FORCING:
    ENABLE: True
    HINT_DROPOUT: 0.65
  AUTOREGRESSIVE:
    ENABLE: True
  GRU:
    ENABLE: True

DATA:
  TRAIN:
    NUM_SAMPLES: [3334, 3333, 3333]
    GRAPH_GENERATOR: ["er", "ws", "delaunay"]
    GENERATOR_PARAMS:
      - { "n": [4, 7, 11, 13, 16], "p_range": [0.17, 0.52] }
      - { "n": [11, 13, 16, 20], "p_range": [0.05, 0.2], "k": [4, 6, 8] }
      - { "n": [4, 7, 11, 13, 16] }
  VAL:
    NUM_SAMPLES: 15
    GRAPH_GENERATOR: ["er", "er", "er", "ws", "ws", "ws", "delaunay", "delaunay", "delaunay"]
    NICKNAME: ["er_16", "er_80", "er_800", "ws_16", "ws_80", "ws_800", "delaunay_16", "delaunay_80", "delaunay_800"]
    GENERATOR_PARAMS:
      - { "p_range": [0.173, 0.52], "n": 16 }
      - { "p_range": [0.054, 0.164], "n": 80 }
      - { "p_range": [0.008, 0.025], "n": 800 }
      - { "p_range": [0.05, 0.2], "k": [4, 6, 8], "n": 16 }
      - { "p_range": [0.05, 0.2], "k": [4, 6, 8], "n": 80 }
      - { "p_range": [0.05, 0.2], "k": [4, 6, 8], "n": 800 }
      - { "n": 16 }
      - { "n": 80 }
      - { "n": 800 }
  TEST:
    NUM_SAMPLES: 15
    GRAPH_GENERATOR: ["er", "er", "er", "ws", "ws", "ws", "delaunay", "delaunay", "delaunay"]
    NICKNAME: ["er_16", "er_80", "er_800", "ws_16", "ws_80", "ws_800", "delaunay_16", "delaunay_80", "delaunay_800"]
    GENERATOR_PARAMS:
      - { "p_range": [0.173, 0.52], "n": 16 }
      - { "p_range": [0.054, 0.164], "n": 80 }
      - { "p_range": [0.008, 0.025], "n": 800 }
      - { "p_range": [0.05, 0.2], "k": [4, 6, 8], "n": 16 }
      - { "p_range": [0.05, 0.2], "k": [4, 6, 8], "n": 80 }
      - { "p_range": [0.05, 0.2], "k": [4, 6, 8], "n": 800 }
      - { "n": 16 }
      - { "n": 80 }
      - { "n": 800 }

TRAIN:
  PRECISION: "16-mixed"
  GRADIENT_CLIP_VAL: 5.0 # just for preventing NaN / inf
  LOSS:
    OUTPUT_LOSS_WEIGHT: 1.0
    HINT_LOSS_WEIGHT: 1.0
    HIDDEN_LOSS_WEIGHT: 0.0
  MAX_EPOCHS: 2000
  CHECKPOINT_MONITOR: "val/loss/ws_800"
  CHECKPOINT_MONITOR_MODE: "min"
  BATCH_SIZE: 512
  ENABLE: True
  NUM_WORKERS: 5
  EARLY_STOPPING_PATIENCE: 2000
  OPTIMIZER:
    LR: 0.0006
    WEIGHT_DECAY: 0.075
  SCHEDULER:
    ENABLE: True
    NAME: "CosineAnnealingWarmRestarts"
    PARAMS: [{ "T_0": 250, "T_mult": 1, "eta_min": 0.00001 }]
    INTERVAL: "epoch"
  WEIGHT_PROJECTION:
    ENABLE: False
    EVERY_N_STEPS: 1
    SCALE_DECAY: False
    SCALE_DECAY_FACTOR: 1.0

LOGGING:
  WANDB:
    PROJECT: "nar-experiments-finetuning"
    GROUP: "grok-sweep"
