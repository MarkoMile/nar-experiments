RUN_NAME: "baseline-grok-grokfast"
ALGORITHM: "bfs"
MODEL:
  DECODER_USE_LAST_HIDDEN: True
  PROCESSOR_USE_LAST_HIDDEN: True
  HIDDEN_DIM: 256
  EDGE_DECODER_FP64: True
  HINT_INJECTION_MODE: "additive" # Lock historical behavior
  PROCESSOR:
    NAME: "PGN"
    RESIDUAL: False
    KWARGS: [{ "aggr": "max" }]
    LAYERNORM:
      ENABLE: True
      MODE: "node"
  LATENT_NOISE_STD: 0.015
  MSG_PASSING_STEPS: 1
  TEACHER_FORCING:
    ENABLE: True
    HINT_DROPOUT: 0.4
  AUTOREGRESSIVE:
    ENABLE: True
    POINTER: False
  LAST_HIDDEN_MODE: "current"
  GRU:
    ENABLE: True

DATA:
  TRAIN:
    NUM_SAMPLES: [16667, 16667, 16666]
    GRAPH_GENERATOR: ["er", "ws", "delaunay"]
    GENERATOR_PARAMS:
      - { "n": [4, 7, 11, 13, 16], "p_range": [0.17, 0.52], "directed": False, "acyclic": False, "weighted": False }
      - {
          "n": [11, 13, 16, 20],
          "p_range": [0.05, 0.2],
          "k": [4, 6, 8],
          "directed": False,
          "acyclic": False,
          "weighted": False,
        }
      - { "n": [4, 7, 11, 13, 16], "directed": False, "acyclic": False, "weighted": False }
  VAL:
    NUM_SAMPLES: 15
    GRAPH_GENERATOR: ["er", "er", "er", "ws", "ws", "ws", "delaunay", "delaunay", "delaunay"]
    NICKNAME: ["er_16", "er_80", "er_800", "ws_16", "ws_80", "ws_800", "delaunay_16", "delaunay_80", "delaunay_800"]
    GENERATOR_PARAMS:
      - { "n": 16, "p_range": [0.173, 0.52], "directed": False, "acyclic": False, "weighted": False }
      - { "n": 80, "p_range": [0.054, 0.164], "directed": False, "acyclic": False, "weighted": False }
      - { "n": 800, "p_range": [0.008, 0.025], "directed": False, "acyclic": False, "weighted": False }
      - { "n": 16, "p_range": [0.05, 0.2], "k": [4, 6, 8], "directed": False, "acyclic": False, "weighted": False }
      - { "n": 80, "p_range": [0.05, 0.2], "k": [4, 6, 8], "directed": False, "acyclic": False, "weighted": False }
      - { "n": 800, "p_range": [0.05, 0.2], "k": [4, 6, 8], "directed": False, "acyclic": False, "weighted": False }
      - { "n": 16, "directed": False, "acyclic": False, "weighted": False }
      - { "n": 80, "directed": False, "acyclic": False, "weighted": False }
      - { "n": 800, "directed": False, "acyclic": False, "weighted": False }
  TEST:
    NUM_SAMPLES: 15
    GRAPH_GENERATOR: ["er", "er", "er", "ws", "ws", "ws", "delaunay", "delaunay", "delaunay"]
    NICKNAME: ["er_16", "er_80", "er_800", "ws_16", "ws_80", "ws_800", "delaunay_16", "delaunay_80", "delaunay_800"]
    GENERATOR_PARAMS:
      - { "n": 16, "p_range": [0.173, 0.52], "directed": False, "acyclic": False, "weighted": False }
      - { "n": 80, "p_range": [0.054, 0.164], "directed": False, "acyclic": False, "weighted": False }
      - { "n": 800, "p_range": [0.008, 0.025], "directed": False, "acyclic": False, "weighted": False }
      - { "n": 16, "p_range": [0.05, 0.2], "k": [4, 6, 8], "directed": False, "acyclic": False, "weighted": False }
      - { "n": 80, "p_range": [0.05, 0.2], "k": [4, 6, 8], "directed": False, "acyclic": False, "weighted": False }
      - { "n": 800, "p_range": [0.05, 0.2], "k": [4, 6, 8], "directed": False, "acyclic": False, "weighted": False }
      - { "n": 16, "directed": False, "acyclic": False, "weighted": False }
      - { "n": 80, "directed": False, "acyclic": False, "weighted": False }
      - { "n": 800, "directed": False, "acyclic": False, "weighted": False }

TRAIN:
  PRECISION: "16-mixed"
  GRADIENT_CLIP_VAL: 0.1
  GRADIENT_ACCUMULATION_STEPS: 2
  LOSS:
    OUTPUT_LOSS_WEIGHT: 1.0
    HINT_LOSS_WEIGHT: 1.0
    HIDDEN_LOSS_WEIGHT: 0.0
  MAX_EPOCHS: 5000
  CHECKPOINT_MONITOR: "val/loss/ws_800"
  CHECKPOINT_MONITOR_MODE: "min"
  BATCH_SIZE: 1024
  ENABLE: True
  NUM_WORKERS: 0
  EARLY_STOPPING_PATIENCE: 5000
  OPTIMIZER:
    LR: 0.0004239
    WEIGHT_DECAY: 0.01
  SCHEDULER:
    ENABLE: False
    NAME: "ReduceLROnPlateau"
    PARAMS: [{ "mode": "min", "factor": 0.5, "patience": 50 }]
  GROKFAST:
    ENABLE: True
    LAMBDA: 1.0
    BETA: 0.98
    WARMUP_STEPS: 100

TEST:
  BATCH_SIZE: 15

LOGGING:
  WANDB:
    PROJECT: "nar-experiments-finetuning"
    GROUP: "PGN"
